<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  Map the font names offered by the subtitle UI to fonts that actually exist
  in the Docker image. Without this, libass silently falls back to DejaVu for
  every choice, so the burned captions never match the in-browser preview
  (github issue #57). Liberation fonts are metric-compatible substitutes for
  the MS core fonts; Anton is the standard open substitute for Impact.
-->
<fontconfig>
  <alias binding="strong"><family>Verdana</family><prefer><family>Liberation Sans</family></prefer></alias>
  <alias binding="strong"><family>Arial</family><prefer><family>Liberation Sans</family></prefer></alias>
  <alias binding="strong"><family>Helvetica</family><prefer><family>Liberation Sans</family></prefer></alias>
  <alias binding="strong"><family>Georgia</family><prefer><family>Liberation Serif</family></prefer></alias>
  <alias binding="strong"><family>Impact</family><prefer><family>Anton</family></prefer></alias>
</fontconfig>
